image:
  repository: ghcr.io/pennomi/rutherford
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

auth:
  provider: oidc
  oidc:
    issuer: ""
    clientId: ""
    audience: ""
    scopes: "openid profile email"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

storage:
  hostPath:
    enabled: false
    path: /var/local-path-provisioner
    pattern: "pvc-[a-f0-9-]+_(?P<namespace>[^_]+)_(?P<name>.+)"

rbac:
  create: true

serviceAccount:
  create: true
  name: ""

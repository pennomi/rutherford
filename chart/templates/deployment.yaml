apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rutherford.fullname" . }}
  labels:
    {{- include "rutherford.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rutherford.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rutherford.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rutherford.fullname" . }}
      containers:
        - name: rutherford
          image: "ghcr.io/pennomi/rutherford:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: AUTH_PROVIDER
              value: "oidc"
            - name: OIDC_ISSUER
              value: {{ .Values.auth.oidc.issuer | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.auth.oidc.clientId | quote }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.auth.oidc.audience | quote }}
            - name: OIDC_SCOPES
              value: "openid profile email"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/auth/config
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/auth/config
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rutherford.fullname" . }}
  labels:
    {{- include "rutherford.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rutherford.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rutherford.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rutherford.serviceAccountName" . }}
      containers:
        - name: rutherford
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: AUTH_PROVIDER
              value: {{ .Values.auth.provider | quote }}
            - name: OIDC_ISSUER
              value: {{ .Values.auth.oidc.issuer | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.auth.oidc.clientId | quote }}
            {{- if .Values.auth.oidc.audience }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.auth.oidc.audience | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.scopes }}
            - name: OIDC_SCOPES
              value: {{ .Values.auth.oidc.scopes | quote }}
            {{- end }}
            {{- if .Values.storage.hostPath.enabled }}
            - name: STORAGE_HOST_PATH
              value: /mnt/storage
            - name: STORAGE_PATH_PATTERN
              value: {{ .Values.storage.hostPath.pattern | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/auth/config
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/auth/config
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- if .Values.storage.hostPath.enabled }}
          volumeMounts:
            - name: storage
              mountPath: /mnt/storage
              readOnly: true
          {{- end }}
      {{- if .Values.storage.hostPath.enabled }}
      volumes:
        - name: storage
          hostPath:
            path: {{ .Values.storage.hostPath.path }}
            type: Directory
      {{- end }}

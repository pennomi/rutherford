apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Example overlay for Google OAuth2 (PKCE).
#
# 1. In Google Cloud Console, create an OAuth 2.0 Client ID of type
#    "Web application". Add https://YOUR_HOSTNAME/callback as an
#    authorized redirect URI.
# 2. Download the JSON credential and save it to this directory as
#    client_secret.json. The file has a top-level "web" object that
#    Rutherford recognizes automatically.
# 3. Replace ALLOWED_EMAILS below with the users you want to permit.
# 4. Replace YOUR_HOSTNAME in ingress.yaml.
# 5. kubectl apply -k .

resources:
  - ../../base
  - ingress.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: rutherford-auth
    files:
      - auth.json=client_secret.json
    literals:
      - allowed_emails=alice@example.com,bob@example.com
